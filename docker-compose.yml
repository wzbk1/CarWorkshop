services:
  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - api-gateway
    restart: unless-stopped

  user-service:
    build: ./user-service
    container_name: user-service
    command: sh -c "python -m alembic upgrade head && python -m uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      DATABASE_URL: ${USER_DB_URL}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
    restart: unless-stopped

  service-management:
    build: ./service-management
    container_name: service-management
    command: sh -c "python -m alembic upgrade head && python -m uvicorn app.main:app --host 0.0.0.0 --port 8001"
    environment:
      DATABASE_URL: ${SERVICE_DB_URL}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: HS256
    restart: unless-stopped

  booking-service:
    build: ./booking-service
    container_name: booking-service
    command: sh -c "python -m alembic upgrade head && python -m uvicorn app.main:app --host 0.0.0.0 --port 8002"
    environment:
      DATABASE_URL: ${BOOKING_DB_URL}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: HS256
      SERVICE_MANAGEMENT_URL: http://service-management:8001
    depends_on:
      - service-management
    restart: unless-stopped

  review-service:
    build: ./review-service
    container_name: review-service
    command: sh -c "python -m alembic upgrade head && python -m uvicorn app.main:app --host 0.0.0.0 --port 8003"
    environment:
      DATABASE_URL: ${REVIEW_DB_URL}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: HS256
    restart: unless-stopped

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8080
    environment:
      USER_SERVICE_URL: http://user-service:8000
      SERVICE_MANAGEMENT_URL: http://service-management:8001
      BOOKING_SERVICE_URL: http://booking-service:8002
      REVIEW_SERVICE_URL: http://review-service:8003
    depends_on:
      - user-service
      - service-management
      - booking-service
      - review-service
    restart: unless-stopped